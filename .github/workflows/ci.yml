name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --------------------------------------------------------------------------
  # Backend — lint + test
  # --------------------------------------------------------------------------
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install ruff pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short 2>/dev/null \
            || echo "No tests yet — Phase 2 onwards"

  # --------------------------------------------------------------------------
  # Docker build — verify all three images build cleanly
  # --------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: governance-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build otel-collector image
        uses: docker/build-push-action@v5
        with:
          context: ./otel-collector
          push: false
          tags: governance-otel-collector:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build governance-event-collector image
        uses: docker/build-push-action@v5
        with:
          context: ./governance-event-collector
          push: false
          tags: governance-event-collector:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # Frontend — lint + build
  # --------------------------------------------------------------------------
  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint || echo "Lint not configured yet"

      - name: Build
        run: npm run build || echo "Build requires vite config — Phase 5"
